[[mgr.prepend_keymap]]
on  = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list', "yank" ]

[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = "N"
for  = "unix"
run  = 'shell --orphan -- nautilus .'
desc = "Open current directory in Nautilus"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = 'cd ~/Documents/'
desc = "Go Documents"

[[mgr.prepend_keymap]]
on   = [ "g", "D" ]
run  = 'cd ~/Desktop/'
desc = "Go Desktop"
