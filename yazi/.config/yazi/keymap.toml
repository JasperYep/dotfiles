[[mgr.prepend_keymap]]
on  = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "!"
for  = "unix"
run  = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

# Local Wayland: also put file URIs on clipboard. SSH/no-Wayland: yank only (wl-copy would hang/lag).
[[mgr.prepend_keymap]]
on  = "y"
run = [ 'shell -- if [ -n "${WAYLAND_DISPLAY:-}" ] && [ -z "${SSH_CONNECTION:-}${SSH_CLIENT:-}${SSH_TTY:-}" ]; then for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list; fi', "yank" ]

[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = "E"
for  = "unix"
run  = 'shell --orphan -- nautilus .'
desc = "Open current directory in Nautilus"

[[mgr.prepend_keymap]]
on   = [ "g", "m" ]
run  = 'cd ~/Documents/'
desc = "Go Documents"

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = 'cd ~/Desktop/'
desc = "Go Desktop"

[[mgr.prepend_keymap]]
on   = [ "g", "l" ]
run  = 'cd ~/Downloads/'
desc = "Go Downloads"
