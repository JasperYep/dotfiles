# Remote Arch Linux tmux config.
# Install path on Arch PC: ~/.tmux.conf

set -g default-terminal "tmux-256color"
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:RGB,xterm-256color:RGB"
set -g terminal-overrides "linux*:AX@,xterm-ghostty:Tc,xterm-256color:Tc"

set -g history-limit 100000
set -s escape-time 0
set -g focus-events on
set -g mouse on
# 默认 Wheel 是 -N 5；配合终端滚轮倍数会跳页，压到 1 行/事件
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode    WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode    WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
unbind C-b
set -g prefix M-s
bind-key M-s send-prefix
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection
set -g set-clipboard on
set -g allow-passthrough on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off

# --- QWERTY Alt Navigation (No Prefix) ---
# 面板切换 (直接按 Alt + h/j/k/l)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# 窗口管理 (直接按 Alt + ...)
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-Q kill-pane
bind -n M-O break-pane

# 窗口切换 (直接按 Alt + 1..9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# 合并面板到指定窗口 (Alt + Shift + 1..9)
bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

# 全屏 (Zoom)
bind -n M-f resize-pane -Z

# 移动窗口 (Alt + Shift + < / >)
bind -n M-< swap-window -t -1 \; select-window -t -1
bind -n M-> swap-window -t +1 \; select-window -t +1

# 交换分屏位置 (Alt + Shift + H/J/K/L)
bind -n M-H swap-pane -U
bind -n M-J swap-pane -D
bind -n M-K swap-pane -U
bind -n M-L swap-pane -D

# 调整面板大小 (Alt + Shift + Up/Down/Left/Right)
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Right resize-pane -R 5

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy --trim --type text/plain"

# 重载配置 (Alt + r)
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# --- 面板创建：方向化 (需要 Prefix: Alt+s) ---

# 逻辑：Alt+a 之后按方向键，在对应位置开新面板
bind h split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
bind k split-window -v -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"

bind -r H resize-pane -L 5

bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5
bind z resize-pane -Z

# Modified-key forwarding for modern terminal applications.
set -g extended-keys on
set -g extended-keys-format csi-u

source-file ~/.config/theme/current/tmux/theme.conf
