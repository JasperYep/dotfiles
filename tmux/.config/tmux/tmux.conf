# ========== 基础设置 ==========

# 设置前缀键为 Ctrl+b（恢复默认）
unbind C-a
set -g prefix C-b
bind C-b send-prefix

# 开启鼠标支持
set -g mouse on

# 设置窗口和面板索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 剪贴板集成
setw -g set-clipboard on

# 更快的按键响应
set -sg escape-time 0
set -g repeat-time 300

# 历史记录行数
set -g history-limit 10000

# 终端颜色支持
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ========== 原始键位保留 ==========

# 水平分割 | 
bind | split-window -h

# 垂直分割 -
bind - split-window -v

# 重新加载配置
bind r source-file ~/.config/tmux/tmux.conf \; display " 󰑓  reloaded "

# 方向键切换面板
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ========== 新增实用键位 ==========

# 快速切换上一个窗口
bind -r ^ last-window

# 快速切换面板（无需前缀键）
bind -r M-h select-pane -L
bind -r M-j select-pane -D
bind -r M-k select-pane -U
bind -r M-l select-pane -R

# 调整面板大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 最大化/恢复当前面板
bind z resize-pane -Z

# 快速创建新窗口
bind c new-window -c "#{pane_current_path}"

# 快速关闭窗口（无需确认）
bind X kill-window
bind x kill-pane

# 同步所有面板
bind S setw synchronize-panes

# 复制模式使用 vi 键位
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# 快速进入复制模式
bind [ copy-mode
bind ] paste-buffer

# 窗口重命名
bind , command-prompt -I "#W" "rename-window '%%'"

# 会话重命名
bind $ command-prompt -I "#S" "rename-session '%%'"

# 选择会话
bind s choose-session

# 快速切换布局
bind Space next-layout

# ========== 极简主义美学 ==========

# 状态栏整体风格 - 干净、极简
set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-interval 5

# 颜色方案 - 柔和的暗色调
set -g status-style 'bg=default,fg=#7c7c7c'

# 左侧状态栏 - 仅显示会话名
set -g status-left-length 40
set -g status-left '#[fg=#a0a0a0,bg=default] #S #[fg=#505050]│ '

# 右侧状态栏 - 仅显示时间
set -g status-right-length 40
set -g status-right '#[fg=#505050]│ #[fg=#a0a0a0,bg=default]%H:%M '

# 窗口列表 - 极简风格
setw -g window-status-format '#[fg=#606060,bg=default] #I #W '
setw -g window-status-current-format '#[fg=#d0d0d0,bg=default,bold] #I #W '
setw -g window-status-separator ''

# 面板边框 - 细线风格
set -g pane-border-style 'fg=#3a3a3a'
set -g pane-active-border-style 'fg=#606060'
set -g pane-border-lines single
set -g pane-border-status off

# 消息提示 - 简洁风格
set -g message-style 'bg=default,fg=#a0a0a0'
set -g message-command-style 'bg=default,fg=#a0a0a0'

# 模式选择（复制模式等）
setw -g mode-style 'bg=#404040,fg=#d0d0d0'

# 时钟样式
setw -g clock-mode-colour '#a0a0a0'
setw -g clock-mode-style 24

# 显示选项样式
set -g display-panes-active-colour '#a0a0a0'
set -g display-panes-colour '#505050'
set -g display-panes-time 800
set -g display-time 800

# ========== 其他优化 ==========

# 自动重命名窗口
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'

# 监控窗口活动
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

# 焦点事件
set -g focus-events on

#  aggressive resize
setw -g aggressive-resize on
