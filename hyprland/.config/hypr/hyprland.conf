monitor=DP-1,3840x2160@60,auto,2
# monitor=HDMI-A-1, 2560x1600@60, auto, 1.5
monitor=HDMI-A-1, disable
monitor=,preferred,auto,1
#################
### AUTOSTART ###
#################

exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = fcitx5 -d --replace

exec-once = waybar
exec-once = mako
exec-once = hyprpaper

exec-once = udiskie
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

###################
### ENVIRONMENT ###
###################

env = AQ_DRM_DEVICES,/dev/dri/card1
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
env = QT_QPA_PLATFORM,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 0
    border_size = 2
    
    col.active_border = rgba(ffffffcc) rgba(ffffff88) 45deg
    col.inactive_border = rgba(59595933)

    resize_on_border = false
    allow_tearing = false
    layout = master
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 0.95
    inactive_opacity = 0.85
    dim_inactive = true
    dim_strength = 0.03

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        xray = true
        contrast = 1.0
        brightness = 0.9
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = windows, 1, 3, easeOutQuint, popin 80%
    animation = windowsIn, 1, 3.5, easeOutQuint, popin 80%
    animation = windowsOut, 1, 3, quick, popin 80%
    animation = windowsMove, 1, 3, easeOutQuint
    animation = border, 1, 1, default
    animation = fade, 1, 3, easeOutQuint
    animation = workspaces, 1, 4.5, easeOutQuint, slide
    animation = specialWorkspace, 1, 4.5, easeOutQuint, slidevert
}

master {
    mfact = 0.55
    new_status = slave
    new_on_top = true
    special_scale_factor = 0.8
}

scrolling {
    column_width = 0.68
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.5
}

workspace = 2, layout:scrolling
workspace = 3, layout:scrolling
workspace = 4, layout:scrolling

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 0
    focus_on_activate = false
}
cursor {
    no_hardware_cursors = true
}
render {
    direct_scanout = false
    expand_undersized_textures = true
    new_render_scheduling = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:ctrl_modifier
    follow_mouse = 0
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
###################
### KEYBINDINGS ###
###################

$mainMod = ALT
$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun

bind = $mainMod, B, exec, killall -SIGUSR1 waybar
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, SPACE, exec, pkill -x wofi || $menu

bind = $mainMod CTRL, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh shrink-main
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh grow-main

bind = $mainMod CTRL, R, layoutmsg, orientationcycle left top center
bind = $mainMod CTRL, COMMA, layoutmsg, removemaster
bind = $mainMod CTRL, PERIOD, layoutmsg, addmaster

bind = $mainMod, N, exec, ~/.config/hypr/scripts/quicknote.sh
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, Q, killactive,
bind = $mainMod, A, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, A, exec, grim -g "$(slurp)" - | satty -f -
bind = $mainMod CTRL, DELETE, exec, hyprctl dispatch exit
bind = $mainMod CTRL, Q , exec, hyprlock
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 0

bind = $mainMod, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh focus-left
bind = $mainMod, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh focus-right
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh move-left
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh move-right
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# bind = $mainMod, A, workspace, e-1
# bind = $mainMod, D, workspace, e+1
# bind = $mainMod CTRL, A, movetoworkspace, e-1
# bind = $mainMod CTRL, D, movetoworkspace, e+1
bind = $mainMod, TAB, workspace, previous
bind = $mainMod SHIFT, RETURN, exec, ~/.config/hypr/scripts/layout-dispatch.sh promote-main


# Mouse Move/Resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


####################
### WINDOW RULES ###
####################


windowrule {
    name = quicknote
    match:class = ^(quicknote)$
    size = 800 500
    float = on
    opacity = 0.9
}

windowrule = match:class org.gnome.Nautilus, opacity 0.9

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = Picture-in-picture
    match:title = ^Picture-in-picture$
    float = on
    pin = on
    border_size = 1
}

windowrule {
    name = Wemeet
    match:class = ^(wemeetapp)$
    no_dim = on
    no_anim = on
    no_blur = on
    no_shadow = on
    dim_around = off
    decorate = off
    no_screen_share = off
    border_size = 0
    opacity = 1.0
}


windowrule {
    name = win10
    match:class = win10 
    tile = on
}


###################
### LAYER RULES ###
###################

layerrule {
  name = waybar_rule
  match:namespace = waybar
  blur = on
  ignore_alpha = 0.5
}

layerrule {
  name = wofi
  match:namespace = wofi
  ignore_alpha = 0.5
  blur = on
  animation = fade
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = selection
}
