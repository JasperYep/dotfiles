# Target-machine monitor, GPU, and device settings live outside the public repo.
source = ~/.config/hypr/host.conf
#################
### AUTOSTART ###
#################

# Restore the selected theme, then start session-bound desktop processes.
exec-once = systemctl --user import-environment HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.local/bin/theme-switch apply
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = fcitx5 -d --replace
exec-once = mako
exec-once = hyprpaper

exec-once = udiskie --appindicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

###################
### ENVIRONMENT ###
###################

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx
env = QT_QPA_PLATFORM,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2

    resize_on_border = false
    allow_tearing = false
    layout = master
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.00
    inactive_opacity = 0.85
    dim_inactive = true

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        xray = true
        contrast = 1.0
        vibrancy = 0.1696
    }
}

# Theme colors / GTK / borders (managed by theme-switch)
source = ~/.config/hypr/theme.conf


animations {
  enabled = true

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1

  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  animation = borderangle, 1, 30, liner, loop
  animation = fade, 1, 5, default
  animation = workspaces, 1, 5, wind
}

master {
    mfact = 0.65
    new_status = slave
    new_on_top = true
}

# workspace = 1, monitor:HDMI-A-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1, layoutopt:mfact:0.68
# workspace = 4, monitor:HDMI-A-1, default:true, layoutopt:mfact:0.60
# workspace = 5, monitor:HDMI-A-1
# workspace = 6, monitor:DP-1
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:DP-1
# workspace = 10, monitor:HDMI-A-1

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
    focus_on_activate = false
}
render {
    direct_scanout = false
    expand_undersized_textures = true
    new_render_scheduling = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:ctrl_modifier
    follow_mouse = 0
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$terminal = ghostty
$fileManager = nautilus
$menu = rofi -show drun

bind = $mainMod, B, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, T, exec, ~/.local/bin/theme-switch toggle
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, SPACE, exec, pkill -x rofi || $menu

bind = $mainMod CTRL, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh shrink-main
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh grow-main

bind = $mainMod CTRL, R, layoutmsg, orientationcycle left top center
bind = $mainMod CTRL, COMMA, layoutmsg, removemaster
bind = $mainMod CTRL, PERIOD, layoutmsg, addmaster

bind = $mainMod, N, exec, ~/.config/hypr/scripts/quicknote.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, Q, killactive,
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | satty -f -
bind = $mainMod CTRL, DELETE, exec, hyprctl dispatch exit
bind = $mainMod CTRL, Q , exec, hyprlock
bind = $mainMod CTRL SHIFT, Q, exec, ~/.config/hypr/scripts/away-lock.sh
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod SHIFT, F, fullscreen, 0

bind = $mainMod, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh focus-left
bind = $mainMod, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh focus-right
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/layout-dispatch.sh move-left
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/layout-dispatch.sh move-right
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, TAB, workspace, previous
bind = $mainMod SHIFT, RETURN, exec, ~/.config/hypr/scripts/layout-dispatch.sh promote-main


# Mouse Move/Resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


####################
### WINDOW RULES ###
####################


windowrule {
    name = quicknote
    match:class = ^(quicknote)$
    size = 800 500
    float = on
    opacity = 0.9
}

windowrule = match:class org.gnome.Nautilus, opacity 0.9

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = Picture-in-picture
    match:title = ^Picture-in-picture$
    float = on
    pin = on
    border_size = 1
}

windowrule {
    name = Wemeet
    match:class = ^(wemeetapp)$
    no_dim = on
    no_anim = on
    no_blur = on
    no_shadow = on
    dim_around = off
    decorate = off
    no_screen_share = off
    border_size = 0
    opacity = 1.0
}


###################
### LAYER RULES ###
###################

layerrule {
  name = waybar_rule
  match:namespace = waybar
  blur = on
  ignore_alpha = 0.5
}

layerrule {
  name = rofi
  match:namespace = rofi
  ignore_alpha = 0.5
  blur = on
  animation = fade
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = selection
}
