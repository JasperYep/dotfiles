# Theme: light (Catppuccin Latte + soft purple)
# Applied by theme-switch; sourced from hyprland.conf

env = XCURSOR_THEME,Bibata-Modern-Ice
env = GTK_THEME,adw-gtk3

general {
    col.active_border = rgba(9D8ECEcc)
    col.inactive_border = rgba(bcc0ccff)
}

decoration {
    dim_strength = 0.03
    blur {
        brightness = 0.9
    }
}
