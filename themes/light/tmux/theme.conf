set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#9ca0b0"
set -g window-status-format " #{window_index} #W "
set -g window-status-current-format " #[bold]#{window_index} #W "
set -g window-status-current-style "bg=#B2A4D4,fg=#ffffff"
set -g status-left " #S "
set -g status-left-style "bg=default,fg=#B2A4D4"
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-style "bg=default,fg=#9ca0b0"
set -g message-style "bg=#B2A4D4,fg=#ffffff"
set -g pane-border-style "fg=#eff1f5"
set -g pane-active-border-style "fg=#B2A4D4"
setw -g pane-border-status top
setw -g pane-border-format " #{?pane_active,#[fg=#B2A4D4],#[fg=#9ca0b0]} #P: #{pane_current_command} "
