set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#6e738d"
set -g window-status-format " #{window_index} #W "
set -g window-status-current-format " #[bold]#{window_index} #W "
set -g window-status-current-style "bg=#B2A4D4,fg=#24273a"
set -g status-left " #S "
set -g status-left-style "bg=default,fg=#B2A4D4"
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-style "bg=default,fg=#6e738d"
set -g message-style "bg=#B2A4D4,fg=#24273a"
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#B2A4D4"
setw -g pane-border-status top
setw -g pane-border-format " #{?pane_active,#[fg=#B2A4D4],#[fg=#6e738d]} #P: #{pane_current_command} "
