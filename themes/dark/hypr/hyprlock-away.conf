$font = Inter, Roboto, sans-serif
$text_color = rgba(202, 211, 245, 1.0)
$subtext_color = rgba(110, 115, 141, 1.0)
$accent_color = rgb(157, 142, 206)

general {
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    grace = 0
}

background {
    monitor =
    path = screenshot
    color = rgba(36, 39, 58, 1.0)

    noise = 0.0
    blur_passes = 3
    blur_size = 4
    brightness = 0.45
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.25
}

# A borderless wash keeps the typography legible on any wallpaper.
shape {
    monitor =
    size = 100%, 100%
    color = rgba(24, 25, 38, 0.72)

    position = 0, 0
    halign = center
    valign = center
    zindex = 1
}

shape {
    monitor =
    size = 196, 6
    color = $accent_color
    rounding = 3

    position = 0, 465
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:0] ~/.config/hypr/scripts/away-lock.sh show

    font_size = 370
    font_family = Source Han Sans CN Heavy
    color = $text_color
    text_align = center

    shadow_passes = 0

    position = 0, 75
    halign = center
    valign = center
    zindex = 3
}

input-field {
    monitor =
    size = 260, 52
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0)
    font_color = $text_color
    fail_color = rgba(237, 135, 150, 0.9)

    fade_on_empty = false
    placeholder_text = <span font_family="$font" foreground="##6e738d">Enter Password</span>
    hide_input = false
    rounding = -1
    check_color = $accent_color
    fail_text = $FAIL

    position = 0, -500
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"

    font_size = 24
    font_family = $font
    font_weight = 400
    color = $subtext_color

    shadow_passes = 0

    position = 0, 54
    halign = center
    valign = bottom
    zindex = 3
}
