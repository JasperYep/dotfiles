$font = Inter, Roboto, sans-serif
# 文字颜色：Macchiato text
$text_color = rgba(202, 211, 245, 1.0)
# 次级文字：overlay0
$subtext_color = rgba(110, 115, 141, 1.0)
# 强调色：软紫
$accent_color = rgb(157, 142, 206)

general {
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    grace = 0
}

background {
    monitor =
    path = screenshot
    color = rgba(36, 39, 58, 1.0)

    # --- 暗色极简 ---
    noise = 0.0
    blur_passes = 3
    blur_size = 4
    brightness = 0.55
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

input-field {
    monitor =
    size = 220, 45
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.0)
    font_color = $text_color
    fail_color = rgba(237, 135, 150, 0.9)

    fade_on_empty = false

    placeholder_text = <span font_family="$font" foreground="##6e738d">Enter Password</span>
    hide_input = false
    rounding = -1
    check_color = $accent_color
    fail_text = $FAIL

    position = 0, -120
    halign = center
    valign = center
}

# 时间 - 巨大的细体字
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"

    font_size = 100
    font_family = $font
    font_weight = 300

    color = $text_color

    shadow_passes = 0
    shadow_size = 0

    position = 0, 50
    halign = center
    valign = center
}

# 日期
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B <span color='##6e738d' font_weight='400'>$(if [ $(( $(date +%V) % 2 )) -eq 1 ]; then echo 'I'; else echo 'II'; fi)</span>"

    font_size = 18
    font_family = $font
    font_weight = 400
    color = $subtext_color

    shadow_passes = 0

    position = 0, -30
    halign = center
    valign = center
}

# 极简底部线条装饰
shape {
    monitor =
    size = 40, 4
    color = rgba(178, 164, 212, 0.35)
    rounding = 2
    rotate = 0
    position = 0, 50
    halign = center
    valign = bottom
}
